app = "mino-starter"
primary_region = "ams"

[build]

[env]
  NODE_ENV = "production"
  DATABASE_URL = "file:/data/prod.db"
  PORT = "3000"
  # Required — set these before deploying:
  #   fly secrets set BETTER_AUTH_SECRET="$(openssl rand -base64 32)"
  #   fly secrets set BETTER_AUTH_URL="https://mino-starter.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "5s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[mounts]
  source = "data"
  destination = "/data"
